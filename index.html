<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sut Skills — Claude Code Skill 合集</title>
    <meta name="description" content="Claude Code 私人 Skill 合集，包含自建 Skill 和收集的优质社区 Skill">
    <meta property="og:title" content="Sut Skills">
    <meta property="og:description" content="Claude Code 私人 Skill 合集">
    <meta property="og:type" content="website">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%23FF6B35'/><text x='50' y='70' font-size='60' font-weight='bold' text-anchor='middle' fill='white' font-family='system-ui'>S</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #080A0F;
            --bg-primary: #0D1117;
            --bg-card: #161B22;
            --bg-card-hover: #1E2530;
            --accent: #FF6B35;
            --accent-glow: rgba(255, 107, 53, 0.15);
            --accent-secondary: #3DD9C6;
            --accent-secondary-glow: rgba(61, 217, 198, 0.15);
            --accent-warm-dim: #CC5529;
            --text-primary: #F0EDE8;
            --text-secondary: #8B949E;
            --text-muted: #484F58;
            --border: rgba(240, 237, 232, 0.06);
            --border-accent: rgba(255, 107, 53, 0.25);
            --radius: 14px;
            --radius-sm: 8px;
            --font-display: 'Syne', 'Noto Sans SC', sans-serif;
            --font-body: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Noise overlay */
        .noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.028;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 200px 200px;
        }

        /* ---- HERO ---- */
        .hero {
            position: relative;
            padding: 100px 32px 64px;
            text-align: center;
            overflow: hidden;
        }

        .hero::before, .hero::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
        }

        .hero::before {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,107,53,0.12) 0%, transparent 70%);
            top: -200px; left: -100px;
            animation: drift 25s ease-in-out infinite;
        }

        .hero::after {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(61,217,198,0.08) 0%, transparent 70%);
            bottom: -150px; right: -100px;
            animation: drift 20s ease-in-out infinite reverse;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(60px, -40px) scale(1.05); }
            66% { transform: translate(-30px, 30px) scale(0.95); }
        }

        .hero-inner {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
        }

        .hero-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(255,107,53,0.1);
            border: 1px solid rgba(255,107,53,0.2);
            border-radius: 100px;
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 28px;
            animation: fadeDown 0.8s ease both;
        }

        .hero-title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: clamp(48px, 8vw, 80px);
            line-height: 1.05;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #F0EDE8 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            animation: fadeDown 0.8s ease 0.1s both;
        }

        .hero-subtitle {
            font-size: 17px;
            color: var(--text-secondary);
            max-width: 480px;
            margin: 0 auto 32px;
            animation: fadeDown 0.8s ease 0.2s both;
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            animation: fadeDown 0.8s ease 0.3s both;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--text-secondary);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: var(--font-display);
        }

        .stat-divider {
            width: 1px;
            height: 32px;
            background: var(--border);
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ---- GRID PATTERN ---- */
        .grid-bg {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 70% 70% at 50% 30%, black 20%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 30%, black 20%, transparent 100%);
            pointer-events: none;
        }

        /* ---- FILTER BAR ---- */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 0 32px 40px;
            position: relative;
            z-index: 1;
            animation: fadeDown 0.8s ease 0.4s both;
        }

        .filter-btn {
            padding: 8px 24px;
            border: 1px solid var(--border);
            border-radius: 100px;
            background: transparent;
            color: var(--text-secondary);
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            border-color: rgba(255,255,255,0.12);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* ---- SKILLS GRID ---- */
        .skills-container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 32px 80px;
            position: relative;
            z-index: 1;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        /* ---- SKILL CARD ---- */
        .skill-card {
            position: relative;
            background: linear-gradient(160deg, var(--bg-card) 0%, rgba(13,17,23,0.9) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0;
            overflow: hidden;
            transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        box-shadow 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        border-color 0.3s ease;
            animation: cardReveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
            cursor: default;
        }

        .skill-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px var(--border-accent);
            border-color: var(--border-accent);
        }

        .skill-card[data-category="collected"]:hover {
            box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(61,217,198,0.25);
            border-color: rgba(61,217,198,0.25);
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(40px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Card accent line */
        .card-accent-line {
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-warm-dim));
        }

        .skill-card[data-category="collected"] .card-accent-line {
            background: linear-gradient(90deg, var(--accent-secondary), #2BA89D);
        }

        .card-body {
            padding: 28px 28px 24px;
        }

        /* Card header */
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .card-badge.self-built {
            background: var(--accent-glow);
            color: var(--accent);
            border: 1px solid rgba(255,107,53,0.2);
        }

        .card-badge.collected {
            background: var(--accent-secondary-glow);
            color: var(--accent-secondary);
            border: 1px solid rgba(61,217,198,0.2);
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .card-index {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* Card content */
        .card-title {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-primary);
            margin-bottom: 12px;
            transition: color 0.3s ease;
        }

        .skill-card:hover .card-title {
            color: #fff;
        }

        .card-desc {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Card tags */
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
        }

        .tag {
            padding: 3px 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .skill-card:hover .tag {
            border-color: rgba(255,255,255,0.08);
            color: var(--text-secondary);
        }

        /* Card footer */
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .card-source {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
        }

        .card-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--accent);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .skill-card[data-category="collected"] .card-link {
            color: var(--accent-secondary);
        }

        .card-link:hover {
            gap: 10px;
        }

        .card-link-arrow {
            transition: transform 0.2s ease;
        }

        .card-link:hover .card-link-arrow {
            transform: translateX(3px);
        }

        /* ---- LOADING ---- */
        .loading-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 80px 0;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* ---- ERROR STATE ---- */
        .error-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 0;
        }

        .error-icon {
            font-size: 40px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .error-msg {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .retry-btn {
            padding: 10px 28px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 100px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .retry-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ---- EMPTY STATE ---- */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 0;
            color: var(--text-muted);
        }

        /* ---- FOOTER ---- */
        .footer {
            border-top: 1px solid var(--border);
            padding: 32px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: var(--accent);
        }

        .footer-inner {
            max-width: 1120px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 768px) {
            .hero {
                padding: 80px 20px 48px;
            }
            .hero-title {
                font-size: 42px;
            }
            .skills-container {
                padding: 0 16px 60px;
            }
            .skills-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .filter-bar {
                padding: 0 16px 28px;
            }
            .hero-stats {
                gap: 20px;
            }
            .footer-inner {
                flex-direction: column;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 36px;
            }
            .filter-btn {
                padding: 6px 16px;
                font-size: 13px;
            }
        }

        /* ---- CARD GLOW EFFECT ---- */
        .skill-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(to top, var(--accent-glow), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .skill-card[data-category="collected"]::after {
            background: linear-gradient(to top, var(--accent-secondary-glow), transparent);
        }

        .skill-card:hover::after {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="noise"></div>

    <header class="hero">
        <div class="grid-bg"></div>
        <div class="hero-inner">
            <div class="hero-badge">Claude Code Skills</div>
            <h1 class="hero-title">Sut Skills</h1>
            <p class="hero-subtitle">Claude Code 私人 Skill 合集 — 自建工具 & 精选社区 Skill，开箱即用</p>
            <div class="hero-stats">
                <div class="stat">
                    <span class="stat-value" id="total-count">-</span>
                    <span>Skills</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <span class="stat-value" id="self-count">-</span>
                    <span>自建</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <span class="stat-value" id="collected-count">-</span>
                    <span>收集</span>
                </div>
            </div>
        </div>
    </header>

    <nav class="filter-bar">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="self-built">自建</button>
        <button class="filter-btn" data-filter="collected">收集</button>
    </nav>

    <div class="skills-container">
        <div class="skills-grid" id="skills-grid">
            <div class="loading-state" id="loading">
                <div class="spinner"></div>
                <p class="loading-text">加载 Skills 中...</p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-inner">
            <span>Sut Skills · Claude Code Skill 合集</span>
            <div class="footer-links">
                <a href="https://github.com/SuTn/sut-skills" target="_blank" rel="noopener">GitHub</a>
                <a href="https://docs.anthropic.com/en/docs/claude-code/skills" target="_blank" rel="noopener">Claude Code Skills 文档</a>
            </div>
        </div>
    </footer>

    <script>
        const REPO = { owner: 'SuTn', name: 'sut-skills' };
        const API_BASE = `https://api.github.com/repos/${REPO.owner}/${REPO.name}`;

        // Collected (external) skills — update manually when adding new ones
        const COLLECTED_SKILLS = [
            {
                name: 'web-access',
                title: 'Web Access',
                description: '联网操作工具，支持搜索、网页抓取、登录后操作、社交媒体内容抓取、动态渲染页面读取等全场景网络交互',
                tags: ['联网', '搜索', '网页抓取', '浏览器'],
                url: 'https://github.com/eze-is/web-access',
                source: 'eze-is/web-access'
            }
        ];

        // Tag derivation from description keywords
        function deriveTags(description, name) {
            const keywordMap = [
                ['图片', '图片生成'], ['画图', 'AI 绘图'], ['图像', '图像生成'],
                ['公众号', '公众号'], ['文章', '内容创作'], ['写作', '写作'],
                ['联网', '网络工具'], ['搜索', '搜索'], ['网页', '网页抓取'],
                ['视频', '视频处理'], ['音频', '音频处理'], ['翻译', '翻译'],
                ['邮件', '邮件'], ['文档', '文档处理'], ['数据', '数据分析'],
            ];
            const text = (description + ' ' + name).toLowerCase();
            const tags = [];
            for (const [kw, tag] of keywordMap) {
                if (text.includes(kw) && !tags.includes(tag)) tags.push(tag);
            }
            if (tags.length === 0) tags.push('工具');
            return tags.slice(0, 4);
        }

        // Format skill name for display
        function formatTitle(name) {
            return name
                .replace(/^sut-/, '')
                .split('-')
                .map(w => w.charAt(0).toUpperCase() + w.slice(1))
                .join(' ');
        }

        // Decode base64 content (UTF-8 safe)
        function decodeContent(base64) {
            const binary = atob(base64.replace(/\n/g, ''));
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return new TextDecoder('utf-8').decode(bytes);
        }

        // Parse YAML-like frontmatter
        function parseFrontmatter(content) {
            const match = content.match(/^---\s*\r?\n([\s\S]*?)\r?\n---/);
            if (!match) return {};
            const meta = {};
            match[1].split(/\r?\n/).forEach(line => {
                const idx = line.indexOf(':');
                if (idx > 0) {
                    meta[line.slice(0, idx).trim()] = line.slice(idx + 1).trim();
                }
            });
            return meta;
        }

        // Fetch JSON from GitHub API
        async function ghFetch(path) {
            const res = await fetch(`${API_BASE}${path}`);
            if (!res.ok) throw new Error(`GitHub API ${res.status}: ${res.statusText}`);
            return res.json();
        }

        // Load self-built skills dynamically
        async function loadSelfBuiltSkills() {
            const contents = await ghFetch('/contents/');
            const dirs = contents.filter(c =>
                c.type === 'dir' && c.name.startsWith('sut-')
            );

            const skills = [];
            await Promise.all(dirs.map(async (dir) => {
                try {
                    const file = await ghFetch(`/contents/${dir.name}/SKILL.md`);
                    const text = decodeContent(file.content);
                    const meta = parseFrontmatter(text);

                    // Extract first paragraph after frontmatter as extended description
                    const body = text.replace(/^---[\s\S]*?---\s*/, '');
                    const firstLine = body.split('\n').find(l => l.trim().length > 0 && !l.startsWith('#')) || '';

                    skills.push({
                        name: meta.name || dir.name,
                        title: formatTitle(meta.name || dir.name),
                        description: meta.description
                            ? meta.description.length > 120
                                ? meta.description.slice(0, 120) + '...'
                                : meta.description
                            : firstLine.replace(/^#*\s*/, '').trim().slice(0, 120),
                        tags: deriveTags(meta.description || '', dir.name),
                        url: `https://github.com/${REPO.owner}/${REPO.name}/tree/main/${dir.name}`,
                        source: `${REPO.owner}/${REPO.name}`,
                        category: 'self-built'
                    });
                } catch (e) {
                    // SKILL.md not found or parse error — skip gracefully
                    console.warn(`Skip ${dir.name}:`, e.message);
                }
            }));
            return skills;
        }

        // Render cards
        function renderCards(allSkills, filter) {
            const grid = document.getElementById('skills-grid');
            const filtered = filter === 'all'
                ? allSkills
                : allSkills.filter(s => s.category === filter);

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state">该分类暂无 Skill</div>';
                return;
            }

            grid.innerHTML = filtered.map((skill, i) => `
                <article class="skill-card" data-category="${skill.category}" style="animation-delay: ${i * 0.08}s">
                    <div class="card-accent-line"></div>
                    <div class="card-body">
                        <div class="card-header">
                            <span class="card-badge ${skill.category}">
                                <span class="badge-dot"></span>
                                ${skill.category === 'self-built' ? '自建' : '收集'}
                            </span>
                            <span class="card-index">#${String(i + 1).padStart(2, '0')}</span>
                        </div>
                        <h3 class="card-title">${skill.title}</h3>
                        <p class="card-desc">${skill.description}</p>
                        <div class="card-tags">
                            ${skill.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                        </div>
                        <div class="card-footer">
                            <span class="card-source">${skill.source}</span>
                            <a class="card-link" href="${skill.url}" target="_blank" rel="noopener">
                                查看详情
                                <span class="card-link-arrow">&rarr;</span>
                            </a>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        // Update stat counters
        function updateStats(allSkills) {
            const self = allSkills.filter(s => s.category === 'self-built').length;
            const collected = allSkills.filter(s => s.category === 'collected').length;
            document.getElementById('total-count').textContent = allSkills.length;
            document.getElementById('self-count').textContent = self;
            document.getElementById('collected-count').textContent = collected;
        }

        // Init
        async function init() {
            const grid = document.getElementById('skills-grid');
            let allSkills = [];

            try {
                // Load self-built skills via GitHub API
                const selfBuilt = await loadSelfBuiltSkills();

                // Merge with collected skills
                allSkills = [
                    ...selfBuilt.map(s => ({ ...s, category: 'self-built' })),
                    ...COLLECTED_SKILLS.map(s => ({ ...s, category: 'collected' }))
                ];

                updateStats(allSkills);
                renderCards(allSkills, 'all');
            } catch (err) {
                console.error('Failed to load skills:', err);
                grid.innerHTML = `
                    <div class="error-state">
                        <div class="error-icon">&#9888;</div>
                        <p class="error-msg">加载失败：${err.message}</p>
                        <button class="retry-btn" onclick="location.reload()">重试</button>
                    </div>
                `;
            }

            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderCards(allSkills, btn.dataset.filter);
                });
            });
        }

        init();
    </script>
</body>
</html>
